# Bubble Card dashboard for Home Assistant.
# Requires the Bubble Card custom card (HACS -> Clooos/bubble-card), which you
# already have installed.
#
# Style: a mobile-first main page with a navigation button row and a few key
# controls, plus pop-ups (slide-up panels) for each area. Tap a nav button to
# open its pop-up.
#
# To use:
#   Settings -> Dashboards -> (+ Add dashboard) -> New dashboard from scratch
#   -> open it -> pencil -> three-dot menu -> Raw configuration editor -> paste.
#
# All entity IDs were validated against your export.

title: Bubble
views:
  - title: Home
    path: home
    icon: mdi:home
    cards:

      # ---- Navigation row (opens the pop-ups below) ----
      - type: custom:bubble-card
        card_type: horizontal-buttons-stack
        1_link: '#lights'
        1_name: Lights
        1_icon: mdi:lightbulb-group
        2_link: '#plugs'
        2_name: Plugs
        2_icon: mdi:power-socket
        3_link: '#climate'
        3_name: Climate
        3_icon: mdi:thermometer
        4_link: '#energy'
        4_name: Energy
        4_icon: mdi:solar-power
        5_link: '#printer'
        5_name: Printer
        5_icon: mdi:printer-3d
        6_link: '#servers'
        6_name: Servers
        6_icon: mdi:server
        7_link: '#media'
        7_name: Media
        7_icon: mdi:play-circle

      # ---- Overview ----
      - type: custom:bubble-card
        card_type: separator
        name: Overview
        icon: mdi:view-dashboard

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: sensor.pylontech_battery_id_512_battery_charge
            name: Battery
            icon: mdi:battery
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: sensor.gx_device_pv_power
            name: Solar
            icon: mdi:solar-power-variant
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: sensor.grid_meter_id_30_grid_power
            name: Grid
            icon: mdi:transmission-tower
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: sensor.gx_device_consumption_power_l1
            name: House
            icon: mdi:home-lightning-bolt

      - type: custom:bubble-card
        card_type: separator
        name: Quick controls
        icon: mdi:gesture-tap-button

      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: input_boolean.all_lights
        name: All Lights
        icon: mdi:lightbulb-group
      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: switch.geyser
        name: Geyser
        icon: mdi:water-boiler
      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: switch.desk
        name: Desk
        icon: mdi:desk

      # ===================== POP-UPS =====================

      # ---- Lights ----
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: '#lights'
            name: Lights
            icon: mdi:lightbulb-group
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: input_boolean.all_lights
            name: All Lights
            icon: mdi:lightbulb-group
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_2
            name: Lounge
            icon: mdi:sofa
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_5
            name: Kitchen
            icon: mdi:countertop
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_4
            name: Passage
            icon: mdi:floor-plan
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_7
            name: Bedroom
            icon: mdi:bed
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_6
            name: Erin
            icon: mdi:bed-king
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_8
            name: Bathroom
            icon: mdi:shower
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_3
            name: Guest Bath
            icon: mdi:toilet
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.ctlight_9
            name: Cupboard
            icon: mdi:wardrobe
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.aqara_night_light
            name: Night Light
            icon: mdi:weather-night
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.desk_wled
            name: Desk WLED
            icon: mdi:led-strip-variant
          - type: custom:bubble-card
            card_type: button
            button_type: slider
            entity: light.kitchen_wled
            name: Kitchen WLED
            icon: mdi:led-strip-variant
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: light.aqara_single_switch_module_t1
            name: Living Switch
            icon: mdi:light-switch
          - type: custom:bubble-card
            card_type: button
            button_type: switch
            entity: switch.home_adaptive_lighting_home
            name: Adaptive Lighting
            icon: mdi:theme-light-dark

      # ---- Plugs ----
      - type: vertical-stack
