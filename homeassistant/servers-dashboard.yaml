# Servers dashboard — full-width panel view (4 host columns).
# panel: true makes the single horizontal-stack span the full browser width.
# Fan-controller cards: moxxy_proxxy_fans_* (Moxxy column) and
# gpuy_proxxy_fans_* (Long-John-Silver column, the R720 GPU host).

title: Servers
views:
- title: Servers
  path: servers
  icon: mdi:server
  panel: true
  cards:
  - type: horizontal-stack
    cards:
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## Plex-Luthor'
      - type: horizontal-stack
        cards:
        - type: gauge
          name: CPU
          entity: sensor.plex_luthor_cpu_temperature
          unit: °C
          min: 20
          max: 90
          needle: true
          severity:
            green: 0
            yellow: 65
            red: 80
        - type: gauge
          name: SSD
          entity: sensor.plex_luthor_hottest_disk
          unit: °C
          min: 20
          max: 90
          needle: true
          severity:
            green: 0
            yellow: 55
            red: 70
      - type: horizontal-stack
        cards:
        - type: gauge
          name: CPU %
          entity: sensor.plex_luthor_cpu_usage
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 70
            red: 90
        - type: gauge
          name: RAM
          entity: sensor.plex_luthor_memory_used
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 75
            red: 90
        - type: gauge
          name: IO Wait
          entity: sensor.plex_luthor_io_wait
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 15
            red: 40
      - type: entities
        title: System
        entities:
        - entity: sensor.plex_luthor_uptime
          name: Uptime
        - entity: sensor.plex_luthor_cpu_load_1m
          name: Load 1m
        - entity: sensor.plex_luthor_cpu_load_5m
          name: Load 5m
        - entity: sensor.plex_luthor_cpu_load_15m
          name: Load 15m
        - entity: sensor.plex_luthor_memory_used_gb
          name: RAM used
        - entity: sensor.plex_luthor_memory_total_gb
          name: RAM total
        - entity: sensor.plex_luthor_disk_used
          name: Storage used
        - entity: sensor.plex_luthor_disk_free
          name: Storage free
        - entity: sensor.plex_luthor_enp1s0_link_speed
          name: enp1s0 link speed
      - type: history-graph
        title: Temperatures – 24h
        hours_to_show: 24
        show_names: false
        min_y_axis: 15
        max_y_axis: 90
        entities:
        - sensor.plex_luthor_cpu_temperature
        - sensor.plex_luthor_disk_sda_samsung_ssd_870_evo_500gb
      - type: history-graph
        title: Network (Mbit/s) – 24h
        hours_to_show: 24
        entities:
        - sensor.plex_luthor_enp1s0_in
        - sensor.plex_luthor_enp1s0_out
        - sensor.plex_luthor_wg0_in
        - sensor.plex_luthor_wg0_out
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## Moxxy-Proxxy'
      - type: horizontal-stack
        cards:
        - type: gauge
          name: CPU 0
          entity: sensor.moxxy_proxxy_cpu_0_temperature
          unit: °C
          min: 20
          max: 90
          needle: true
          severity:
            green: 0
            yellow: 65
            red: 80
        - type: gauge
          name: CPU 1
          entity: sensor.moxxy_proxxy_cpu_1_temperature
          unit: °C
          min: 20
          max: 90
          needle: true
          severity:
            green: 0
            yellow: 65
            red: 80
        - type: gauge
          name: HDDs
          entity: sensor.moxxy_proxxy_hottest_disk
          unit: °C
          min: 20
          max: 90
          needle: true
          severity:
            green: 0
            yellow: 45
            red: 55
      - type: horizontal-stack
        cards:
        - type: gauge
          name: CPU %
          entity: sensor.moxxy_proxxy_cpu_usage
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 70
            red: 90
        - type: gauge
          name: RAM
          entity: sensor.moxxy_proxxy_memory_used
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 75
            red: 90
        - type: gauge
          name: IO Wait
          entity: sensor.moxxy_proxxy_io_wait
          unit: '%'
          min: 0
          max: 100
          needle: true
          severity:
            green: 0
            yellow: 15
            red: 40
      - type: entities
        title: System
        entities:
        - entity: sensor.moxxy_proxxy_uptime
          name: Uptime
        - entity: sensor.moxxy_proxxy_cpu_load_1m
          name: Load 1m
        - entity: sensor.moxxy_proxxy_cpu_load_5m
          name: Load 5m
        - entity: sensor.moxxy_proxxy_cpu_load_15m
          name: Load 15m
        - entity: sensor.moxxy_proxxy_memory_used_gb
          name: RAM used
        - entity: sensor.moxxy_proxxy_memory_total_gb
          name: RAM total
        - entity: sensor.moxxy_proxxy_disk_used
          name: Storage used
        - entity: sensor.moxxy_proxxy_disk_free
          name: Storage free
        - entity: sensor.moxxy_proxxy_vmbr0_link_speed
          name: vmbr0 link speed
      - type: history-graph
        title: Temperatures – 24h
        hours_to_show: 24
        show_names: false
        min_y_axis: 15
        max_y_axis: 90
        entities:
        - sensor.moxxy_proxxy_cpu_0_temperature
        - sensor.moxxy_proxxy_cpu_1_temperature
        - sensor.moxxy_proxxy_disk_sda_st4000lm024_2an17v
        - sensor.moxxy_proxxy_disk_sdb_st4000lm024_2an17v
      - type: history-graph
        title: Network (Mbit/s) – 24h
        hours_to_show: 24
        entities:
        - sensor.moxxy_proxxy_vmbr0_in
        - sensor.moxxy_proxxy_vmbr0_out
        - sensor.moxxy_proxxy_nic0_in
        - sensor.moxxy_proxxy_nic0_out
        - sensor.moxxy_proxxy_nic1_in
        - sensor.moxxy_proxxy_nic1_out
      - type: markdown
        content: '### Fan control'
      - type: gauge
        name: Fan Target
        entity: sensor.moxxy_proxxy_fans_fan_target
        unit: '%'
        min: 0
        max: 100
        needle: true
        severity:
          green: 0
          yellow: 60
          red: 85
      - type: entities
        title: Fan control
        entities:
        - entity: number.moxxy_proxxy_fans_fan_override
          name: Override % (0 = auto)
        - entity: sensor.moxxy_proxxy_fans_cpu_gpu_temp
          name: CPU/GPU temp (curve)
        - entity: sensor.moxxy_proxxy_fans_hdd_temp
          name: HDD temp (curve)
        - entity: sensor.moxxy_proxxy_fans_inlet_temp
          name: Inlet
        - entity: sensor.moxxy_proxxy_fans_exhaust_temp
          name: Exhaust
        - entity: sensor.moxxy_proxxy_fans_temp_0eh
          name: CPU (iDRAC 0Eh)
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## TrueNasty'
      - type: horizontal-stack
