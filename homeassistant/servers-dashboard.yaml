      - type: history-graph
        title: Network (Mbit/s) – 24h
        hours_to_show: 24
        entities:
        - sensor.truenasty_enp6s18_in
        - sensor.truenasty_enp6s18_out
    - type: vertical-stack
      cards:
      - type: markdown
        content: '## Long-John-Silver (GPU)'
      - type: horizontal-stack
        cards:
        - type: gauge
          name: Tesla P4
          entity: sensor.long_john_silver_gpu_0_tesla_p4
