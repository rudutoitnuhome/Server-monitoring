      - type: entities
        title: System
        entities:
        - entity: sensor.truenasty_uptime
          name: Uptime
        - entity: sensor.truenasty_cpu_load_1m
          name: Load 1m
        - entity: sensor.truenasty_cpu_load_5m
          name: Load 5m
        - entity: sensor.truenasty_cpu_load_15m
          name: Load 15m
        - entity: sensor.truenasty_memory_used_gb
          name: RAM used
        - entity: sensor.truenasty_memory_total_gb
          name: RAM total
        - entity: sensor.truenasty_disk_used
          name: Storage used
        - entity: sensor.truenasty_disk_free
          name: Storage free
      - type: entities
        title: Disks
        entities:
        - entity: sensor.truenasty_disk_sdb_dev_sdb
          name: Disk sdb
        - entity: sensor.truenasty_disk_sdc_dev_sdc
          name: Disk sdc
        - entity: sensor.truenasty_disk_sdd_dev_sdd
