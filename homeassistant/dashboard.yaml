# Home Assistant dashboard for server_monitor temperatures.
#
# Built-in cards only (no HACS). Entity IDs below match the live entities as of
# setup; if you rebuild a host's disks or rename a host, re-check the ids via
# Developer Tools -> Template and update accordingly.
#
# To use:
#   Settings -> Dashboards -> (+ Add dashboard) -> New dashboard from scratch,
#   then open it -> top-right pencil -> three-dot menu -> "Raw configuration
#   editor" and paste everything below.

title: Servers
views:
  - title: Temperatures
    path: temps
    icon: mdi:thermometer
    cards:

      # ---------------- Plex-Luthor ----------------
      - type: vertical-stack
        cards:
          - type: gauge
            name: Plex-Luthor CPU
            entity: sensor.plex_luthor_cpu_temperature
            unit: °C
            min: 20
            max: 90
            needle: true
            severity:
              green: 0
              yellow: 65
              red: 80
          - type: entities
            title: Plex-Luthor
            state_color: true
            entities:
              - entity: sensor.plex_luthor_cpu_temperature
                name: CPU
              - entity: sensor.plex_luthor_disk_sda_samsung_ssd_870_evo_500gb
                name: SSD sda (870 EVO)
          - type: history-graph
            title: Plex-Luthor – 24h
            hours_to_show: 24
            entities:
              - sensor.plex_luthor_cpu_temperature
              - sensor.plex_luthor_disk_sda_samsung_ssd_870_evo_500gb

      # ---------------- Moxxy-Proxxy ----------------
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: gauge
                name: CPU 0
                entity: sensor.moxxy_proxxy_cpu_0_temperature
                unit: °C
                min: 20
                max: 90
                needle: true
                severity:
                  green: 0
                  yellow: 65
                  red: 80
              - type: gauge
                name: CPU 1
                entity: sensor.moxxy_proxxy_cpu_1_temperature
                unit: °C
                min: 20
                max: 90
                needle: true
                severity:
                  green: 0
                  yellow: 65
                  red: 80
          - type: entities
            title: Moxxy-Proxxy
            state_color: true
            entities:
              - entity: sensor.moxxy_proxxy_cpu_0_temperature
                name: CPU 0
              - entity: sensor.moxxy_proxxy_cpu_1_temperature
                name: CPU 1
              - entity: sensor.moxxy_proxxy_disk_sda_st4000lm024_2an17v
                name: Disk sda (ST4000LM024)
              - entity: sensor.moxxy_proxxy_disk_sdb_st4000lm024_2an17v
                name: Disk sdb (ST4000LM024)
          - type: history-graph
            title: Moxxy-Proxxy – 24h
            hours_to_show: 24
            entities:
              - sensor.moxxy_proxxy_cpu_0_temperature
              - sensor.moxxy_proxxy_cpu_1_temperature
              - sensor.moxxy_proxxy_disk_sda_st4000lm024_2an17v
              - sensor.moxxy_proxxy_disk_sdb_st4000lm024_2an17v

      # ---------------- TrueNasty ----------------
      - type: vertical-stack
        cards:
          - type: gauge
            name: TrueNasty CPU
            entity: sensor.truenasty_cpu_temperature
            unit: °C
            min: 20
            max: 90
            needle: true
            severity:
              green: 0
              yellow: 65
              red: 80
          - type: entities
            title: TrueNasty
            state_color: true
            entities:
              - entity: sensor.truenasty_cpu_temperature
                name: CPU
              - type: section
                label: Disks
              - entity: sensor.truenasty_disk_sdb_dev_sdb
                name: Disk sdb
              - entity: sensor.truenasty_disk_sdc_dev_sdc
                name: Disk sdc
              - entity: sensor.truenasty_disk_sdd_dev_sdd
                name: Disk sdd
              - entity: sensor.truenasty_disk_sde_dev_sde
                name: Disk sde
              - entity: sensor.truenasty_disk_sdf_dev_sdf
                name: Disk sdf
              - entity: sensor.truenasty_disk_sdg_dev_sdg
                name: Disk sdg
              - entity: sensor.truenasty_disk_sdh_dev_sdh
                name: Disk sdh
              - entity: sensor.truenasty_disk_sdi_dev_sdi
                name: Disk sdi
          - type: history-graph
            title: TrueNasty disks – 24h
            hours_to_show: 24
            entities:
              - sensor.truenasty_disk_sdb_dev_sdb
              - sensor.truenasty_disk_sdc_dev_sdc
              - sensor.truenasty_disk_sdd_dev_sdd
              - sensor.truenasty_disk_sde_dev_sde
              - sensor.truenasty_disk_sdf_dev_sdf
              - sensor.truenasty_disk_sdg_dev_sdg
              - sensor.truenasty_disk_sdh_dev_sdh
              - sensor.truenasty_disk_sdi_dev_sdi
