# TrueNAS SCALE "Custom App" spec for server_monitor.
#
# In the TrueNAS web UI:  Apps -> Discover Apps -> Custom App -> "Install via YAML"
# and paste this file.
#
# Before installing:
#   1. Build the image on TrueNAS (root shell):
#        cd /mnt/<POOL>/apps
#        git clone https://github.com/rudutoitnuhome/Server-monitoring.git
#        cd Server-monitoring && docker build -t server-monitor:local .
#      (Rebuild + restart the app to pick up new versions after a `git pull`.)
#   2. Create the config dir, e.g.  /mnt/<POOL>/apps/server-monitor
#      and put your edited config.yaml there (copy from config.example.yaml).
#   3. Replace <POOL> below with your pool name.
#
# Notes:
#   * Uses the locally-built image (pull_policy: never) so Docker never tries to
#     pull from a registry. To use the GHCR image instead, set
#       image: ghcr.io/rudutoitnuhome/server-monitor:latest
#     and remove pull_policy.
#   * privileged + host /dev are required so smartctl can read disk SMART data.
#   * /sys is mounted read-only so lm-sensors can read CPU temps *if* the host
#     has the relevant hwmon modules loaded (disk temps work regardless).
#   * network_mode: host keeps it simple to reach your MQTT broker.

services:
  server-monitor:
    image: server-monitor:local  # built locally with `docker build -t server-monitor:local .`
    pull_policy: never           # use the local image; never pull from a registry
    container_name: server-monitor
    restart: unless-stopped
    privileged: true              # required for smartctl disk access
    network_mode: host            # so it can reach the MQTT broker directly
    volumes:
      - /mnt/<POOL>/apps/server-monitor/config.yaml:/etc/server-monitor/config.yaml:ro
      - /dev:/dev                 # disk devices for smartctl
      - /sys:/sys:ro              # hwmon for CPU temps (best effort)
      - /run/udev:/run/udev:ro    # helps smartctl identify devices
