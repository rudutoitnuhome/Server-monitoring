# fan_controller.py configuration — copy to /etc/fan-controller/config.yaml
# and edit. Runs on the Proxmox host whose fans you want to control.

mqtt:
  host: 192.168.4.42
  port: 1883
  username: rudi
  password: changeme

# HA device name for this chassis.
node_name: r720

base_topic: server-monitor   # where server_monitor.py publishes temps (don't change unless you did there)
fan_topic: server-fan        # this controller's own MQTT topics
interval: 30                 # control loop seconds

ipmi:
  vendor: dell               # dell | huawei
  host: 192.168.4.6          # iDRAC IP. Set to null to use the LOCAL bmc (-I open)
  username: ipmi
  password: changeme
  interface: lanplus

# --- Huawei (vendor: huawei) — iMana 200 AND iBMC, via SNMP ----------------
# Huawei controls fans over SNMP using the Huawei enterprise MIB, NOT raw IPMI
# or Redfish (iMana 200 has no Redfish). Requirements on the host:
#   apt install snmp           # net-snmp snmpset/snmpwalk
# and on the BMC: enable SNMP v2c with a READ-WRITE community.
# The OIDs/values below are the known-working set; confirm with --probe.
# snmp:
#   host: 192.168.4.7
#   community: your-readwrite-community
#   version: "2c"
#   # defaults (override only if --probe shows different):
#   # manual_oid: .1.3.6.1.4.1.2011.2.235.1.1.8.1.0
#   # manual_value: "1,0"
#   # speed_oid:  .1.3.6.1.4.1.2011.2.235.1.1.8.2.0
#   # auto_value:  "0"
#   # Optional: ambient temps via ipmitool (iMana supports standard IPMI):
#   ipmi:
#     host: 192.168.4.7
#     username: ipmi
#     password: changeme
#     interface: lanplus
#
# --- Huawei newer iBMC only (vendor: huawei-redfish), via Redfish -----------
# redfish:
#   host: 192.168.4.7
#   username: Administrator
#   password: changeme
#   verify_tls: false
#   chassis_id: "1"
#
# --- HPE iLO4 Gen8/Gen9 (vendor: hpe), via SSH ------------------------------
# Requires the iLO firmware patched with ilo4_unlock (<= v2.77) so the `fan` CLI
# is available, and the `paramiko` package (installed by install.sh). iLO5+ is
# NOT supported. Run --probe (which runs `fan info`) to list the PWM ids, then
# put them in `fans`. Speed is forced with `fan p <id> lock <pwm>` (0-255).
# hpe:
#   host: 192.168.4.8          # iLO IP
#   username: Administrator
#   password: changeme
#   ssh_port: 22
#   fans: [0, 1, 2, 3, 4, 5]   # PWM ids from `fan info` (--probe)
#   pwm_max: 255               # 100% maps to this
#   # Optional ambient temps via ipmitool (iLO4 supports standard IPMI):
#   ipmi:
#     host: 192.168.4.8
#     username: Administrator
#     password: changeme
#     interface: lanplus

# Temperature inputs. `node` is a server_monitor node; keys/key_regex are its
# state-JSON keys (the [bracketed] names in `server_monitor.py --once`).
#
# Example R720: its own CPU temps come from the Proxmox host's monitor agent
# (node "r720host"), and the GPU temp comes from the VM running on it
# (node "long_john_silver").
sources:
  cpu_gpu:
    - node: r720host
      key_regex: '^cpu\d*_temp$'        # cpu_temp / cpu0_temp / cpu1_temp
    - node: long_john_silver            # GPU VM living on this host
      key_regex: '^gpu\d+_temp$'
  hdd:
    - node: r720host
      key_regex: '^disk_.*_temp$'
  # No GPU on this host? Just delete the GPU source line above (don't leave the
  # node blank). The cpu_gpu curve will run on the CPU temps alone.

# Fan curves: a band applies when temp < `below` (first match wins).
curves:
  cpu_gpu:
    - {below: 45, percent: 10}
    - {below: 55, percent: 20}
    - {below: 65, percent: 45}
    - {below: 70, percent: 70}
    - {below: 999, percent: 100}
  hdd:
    - {below: 45, percent: 20}
    - {below: 55, percent: 30}
    - {below: 65, percent: 45}
    - {below: 70, percent: 70}
    - {below: 999, percent: 100}

ambient:
  enabled: true              # publish ipmitool sdr temperatures (inlet/exhaust/...) to HA

safety:
  stale_seconds: 180         # temps older than this are ignored
  min_percent: 20            # never command below this in curve mode
  ipmi_failures_before_auto: 3   # restore BMC auto control after this many IPMI errors
